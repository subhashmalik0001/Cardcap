name: nebula
description: "Nebula — Business card scanner with on-device OCR"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  image: ^4.1.7
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_contacts: ^1.1.9+1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  uuid: ^4.4.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  collection: ^1.18.0
  equatable: ^2.0.5
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  http: ^1.2.0
  share_plus: ^13.1.0
  camera: ^0.11.0+2
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_text_recognition: ^0.15.1
  image_cropper: ^8.0.2
  vibration: ^3.0.0
  supabase_flutter: ^2.5.0
  google_mlkit_barcode_scanning: ^0.14.2
  image_gallery_saver_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/Icon.png
    - assets/images/Logo.png
